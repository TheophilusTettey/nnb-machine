# Copy to nnb_pipeline/config.yaml and set your paths.

raw_data_root: "/path/to/your/lsm/microscopy/folder"

manual_workbooks:
  my_session: "/path/to/reference-workbook.xlsx"

processed_reference: null

discard_first_frames: 10
expected_frames: 150
detrend: true
roi_mode: geometric
register_for_qc: false
reference_frame: 0
registration_upsample: 10
intensity_range: [4, 30]

pixel_size_nm: 80
nucleus_percentile_threshold: 88
nucleus_box_half_px: 10
array_radius_px: 4
roi_root: null
roi_cache_root: "nnb_analysis_output/roi_cache"
use_manual_inclusion: true

motion_flags:
  enabled: true
  z_mov_max_frame_corr: -0.07
  z_mov_max_mean_cv: 0.026
  z_mov_max_area_cv: 0.09
  xy_shift_high_mean_px: 11.5
  xy_min_frame_corr: -0.03
  xy_shift_medium_mean_px: 12.0
  rotation_min_shift_px: 50.0
  rotation_min_drift_px: 5.0
  centroid_std_px: 0.52
  array_max_jump_px: 2.8
  multiple_array_ratio_info: 0.94
  little_mov_shift_lo: 12.0

pixel_min_mean: 1.0
brightness_min: 0.5
brightness_max: 20.0
invalid_epsilon: -1

ib_gating:
  brightness_max: 2.0
  nucleus_i_lo_range: [6.0, 18.0]
  nucleus_i_hi_range: [14.0, 32.0]
  array_i_lo_range: [12.0, 35.0]
  array_i_hi_range: [18.0, 55.0]
  search_step: 0.5
  fit_step: 0.25
  min_nucleus_pixels: 40
  min_array_pixels: 8

umbral_x_step: 0.0228199996054173
umbral_1_start: 0.626010000705719

machine:
  detrend: false
  roi_mode: ib_scatter
  skip_nb_if_excluded: true
  review_threshold: 0.65
  use_fitted_windows: true
  ib_window_cache_root: "nnb_analysis_output/ib_window_cache"
  umbral_n_bins: 45
  qc_model_path: "nnb_pipeline/models/qc_classifier.joblib"
  array_umbral_start: null
  accuracy_targets:
    qc_judgment_min: 0.99
    inclusion_min: 0.95
    nucleus_b_mae_max: 0.01
    array_b_mae_max: 0.03

qc:
  use_movement_qc: false
  use_multiple_array_qc: false
  max_motion_ring_fraction: 0.38
  z_exclude_min_frame_corr: -0.10
  z_exclude_min_ring: 0.12
  xy_exclude_max_shift_px: 24.5
  xy_exclude_min_frame_corr: -0.12
  xy_exclude_mean_shift_px: 15.0
  max_centroid_drift_px: 15.0
  max_centroid_std_px: 4.0
  min_frame_correlation: 0.55
  max_nuclear_mean_cv: 0.10
  max_laplacian_var_cv: 0.30
  max_array_secondary_ratio: 0.98
  exclude_obs_keywords:
    - "it moves"
    - "mov z"
    - "z mov"
    - "cell rotates"
    - "it rotates"
    - "mov z y x-y"
    - "array moves in z"
    - "array moves"
    - "no array"
    - "too small"
    - "too open"
    - "cyto agrregatte"
    - "overlap foci"

sessions:
  my_session:
    folder: "2024-03-15-MyExperiment"
    control_condition: MONOMER
    conditions:
      - id: MONOMER
        subdir: monomer_transfected
        file_glob: "*GRmon*.lsm"
        manual_sheet_block: "GRmon Nuc"
      - id: MUTANT_A
        subdir: mutant_A_stable
        file_glob: "*MutA*.lsm"
        manual_sheet_block: "MutantA Nuc"
      - id: MUTANT_B
        subdir: mutant_B_stable
        file_glob: "*MutB*.lsm"
        manual_sheet_block: "MutantB Nuc"